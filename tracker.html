<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent
}
:root{
  --bg:#0a0a0a;
  --card:rgba(18,18,18,.94);
  --card2:#1a1a1a;
  --line:rgba(255,255,255,.07);
  --accent:#ff3333;
  --green:#22c55e;
  --yellow:#f59e0b;
  --blue:#3b82f6;
  --text:#fff;
  --muted:#8b8b8b;
  --radius:16px;
  --nav-h:76px
}
html,body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:"DM Sans",sans-serif
}
body{
  display:flex;
  flex-direction:column
}
button,input,select{
  font-family:inherit
}
button{
  cursor:pointer
}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px 10px;
  flex-shrink:0
}
.logo{
  font-family:"Bebas Neue",sans-serif;
  font-size:22px;
  letter-spacing:2px
}
.logo span{
  color:var(--accent)
}
.user-avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Bebas Neue",sans-serif;
  font-size:17px;
  color:#fff;
  overflow:hidden;
  border:0
}
.pages{
  flex:1;
  position:relative;
  overflow:hidden
}
.page{
  position:absolute;
  inset:0;
  display:none;
  overflow-y:auto;
  overflow-x:hidden;
  padding:16px 16px 105px;
  -webkit-overflow-scrolling:touch
}
.page.active{
  display:block
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 2px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04)
}
.eyebrow{
  font-size:10px;
  color:#666;
  text-transform:uppercase;
  letter-spacing:1.5px;
  font-weight:800;
  margin-bottom:10px
}
.title{
  font-family:"Bebas Neue",sans-serif;
  font-size:36px;
  letter-spacing:2px;
  line-height:1
}
.bottom-nav{
  position:fixed;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  width:calc(100% - 24px);
  max-width:440px;
  height:76px;
  background:rgba(20,20,20,.78);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:0 6px;
  z-index:100;
  box-shadow:0 8px 32px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06)
}
.nav-btn{
  flex:1;
  min-width:0;
  background:none;
  border:0;
  color:#555;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  padding:6px 0;
  transition:.2s
}
.nav-btn svg{
  width:21px;
  height:21px;
  stroke-width:1.8
}
.nav-btn span{
  font-size:9px;
  font-weight:700;
  color:#555;
  white-space:nowrap
}
.nav-btn.active,.nav-btn.active span{
  color:var(--accent)
}
.nav-btn.active svg{
  stroke:var(--accent)
}
.nav-icon-wrap{
  width:43px;
  height:33px;
  border-radius:13px;
  display:flex;
  align-items:center;
  justify-content:center
}
.nav-btn.active .nav-icon-wrap{
  background:rgba(255,51,51,.18);
  box-shadow:0 0 12px rgba(255,51,51,.18)
}
.nav-dot{
  width:4px;
  height:4px;
  border-radius:99px;
  background:transparent
}
.nav-btn.active .nav-dot{
  background:var(--accent)
}
.hero{

  min-height:330px;
  margin:-16px -16px 0;
  padding:20px;
  overflow:hidden;
  background:#0a0a0a
}
