<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EVRYONE TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--card:rgba(18,18,18,.94);--card2:#1a1a1a;--line:rgba(255,255,255,.07);--accent:#ff3333;--green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--text:#fff;--muted:#8b8b8b;--radius:16px;--nav-h:76px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}
body{display:flex;flex-direction:column}
button,input,select{font-family:inherit}
button{cursor:pointer}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0}
.logo{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px}.logo span{color:var(--accent)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:17px;color:#fff;overflow:hidden;border:0}
.pages{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;display:none;overflow-y:auto;overflow-x:hidden;padding:16px 16px 105px;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04)}
.eyebrow{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;margin-bottom:10px}
.title{font-family:"Bebas Neue",sans-serif;font-size:36px;letter-spacing:2px;line-height:1}
.bottom-nav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:calc(100% - 24px);max-width:440px;height:76px;background:rgba(20,20,20,.78);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.08);border-radius:28px;display:flex;align-items:center;justify-content:space-around;padding:0 6px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06)}
.nav-btn{flex:1;min-width:0;background:none;border:0;color:#555;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 0;transition:.2s}
.nav-btn svg{width:21px;height:21px;stroke-width:1.8}.nav-btn span{font-size:9px;font-weight:700;color:#555;white-space:nowrap}.nav-btn.active,.nav-btn.active span{color:var(--accent)}.nav-btn.active svg{stroke:var(--accent)}
.nav-icon-wrap{width:43px;height:33px;border-radius:13px;display:flex;align-items:center;justify-content:center}.nav-btn.active .nav-icon-wrap{background:rgba(255,51,51,.18);box-shadow:0 0 12px rgba(255,51,51,.18)}
.nav-dot{width:4px;height:4px;border-radius:99px;background:transparent}.nav-btn.active .nav-dot{background:var(--accent)}
.hero{position:relative;min-height:330px;margin:-16px -16px 0;padding:20px;overflow:hidden;background:#0a0a0a}
.hero:before{content:"";position:absolute;inset:0;background:url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=900&q=70") right center/cover no-repeat;opacity:.35}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(to right,#0a0a0a 38%,rgba(10,10,10,.35)),linear-gradient(to top,#0a0a0a,transparent 28%)}
.hero-inner{position:relative;z-index:1}
.hero h1{font-size:33px;font-weight:800;line-height:1.08;margin:8px 0 22px}.hero h1 em{display:block;color:var(--accent)}
.ring{position:relative;width:190px;height:190px;margin:0 auto}.ring svg{transform:rotate(-90deg)}.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-value{font-family:"Bebas Neue",sans-serif;font-size:50px;line-height:1}.ring-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.7px}.ring-sub{font-size:12px;color:#666}
.stats-3{display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden;padding:0}.stat-cell{padding:16px 13px;border-right:1px solid var(--line)}.stat-cell:last-child{border-right:0}.stat-val{font-family:"Bebas Neue",sans-serif;font-size:28px;line-height:1}.stat-lbl{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.daily-grid{display:grid;grid-template-columns:100px 1fr;gap:16px;align-items:center}.score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px}.score-row i{width:9px;height:9px;border-radius:99px;display:inline-block;margin-right:8px}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.progress-bars{display:flex;align-items:flex-end;gap:5px;min-height:75px}.progress-bars div{flex:1;border-radius:6px 6px 3px 3px;background:#242424;min-height:10px}
.week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.week-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:2px}.week-nav button{background:none;border:0;color:#777;font-size:22px;padding:4px 10px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:22px}.day-col{text-align:center;padding:5px 0;cursor:pointer}.day-name{font-size:9px;color:#555;font-weight:800;margin-bottom:6px}.day-num{font-family:"Bebas Neue";font-size:18px;line-height:32px;color:#888}.day-num.active{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff}.day-dot{width:5px;height:5px;border-radius:50%;background:#2a2a2a;margin:4px auto 0}.day-dot.done{background:var(--green)}
.session-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:12px}.session-top{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--line)}.session-name{font-family:"Bebas Neue";font-size:24px;letter-spacing:1.5px}.badge{font-size:11px;font-weight:800;color:#fff;background:var(--accent);padding:5px 10px;border-radius:99px}
.exo{border-bottom:1px solid rgba(255,255,255,.045)}.exo-head{display:grid;grid-template-columns:1fr 44px 55px 52px;gap:5px;align-items:center;padding:12px 16px;cursor:pointer}.exo-title{font-size:13px;font-weight:700}.exo-sub{font-size:10px;color:#666;margin-top:2px}.exo-body{display:none;background:#0f0f0f;padding:0 16px 12px}.exo-body.open{display:block}
.set-head,.set-row{display:grid;grid-template-columns:28px 1fr 1fr 42px;gap:8px;align-items:center}.set-head{font-size:9px;color:#444;text-transform:uppercase;text-align:center;border-bottom:1px solid #222;padding:7px 0 5px;margin-bottom:4px}.set-row{padding:4px 0}.set-num{font-family:"Bebas Neue";font-size:20px;color:#555;text-align:center}.set-num.done{color:var(--green)}
.set-input{width:100%;background:rgba(10,10,10,.75);border:1px solid var(--line);border-radius:8px;padding:9px 6px;color:#fff;font-size:15px;font-weight:700;text-align:center}.set-input.filled{background:#0a150a;color:var(--green)}.set-input:focus{outline:0;background:#191919}
.set-ok{width:36px;height:36px;border-radius:50%;border:2px solid #333;background:none;color:#555;display:flex;align-items:center;justify-content:center}.set-ok.done{background:var(--green);border-color:var(--green);color:#fff}.set-ok svg{width:14px;height:14px}
.btn-main{width:100%;padding:16px;border:0;border-radius:14px;background:var(--accent);color:#fff;font-family:"Bebas Neue";font-size:20px;letter-spacing:2px;margin:10px 0 12px}
.meal{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden}.meal-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}.check-circle{width:32px;height:32px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0}.check-circle.done{background:var(--accent);border-color:var(--accent)}.meal-body{display:none;padding:0 16px 16px}.meal-body.open{display:block}.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}.macro-cell{padding:5px 12px;border-right:1px solid #222}.macro-cell:last-child{border-right:0}.macro-val{font-family:"Bebas Neue";font-size:28px}.bar{height:5px;background:#222;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;border-radius:99px;width:0;transition:.5s}
.water-row{display:flex;gap:10px;flex-wrap:wrap}.water-glass{width:36px;height:36px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}.water-glass.filled{background:#0a1020}
.tab-row{display:flex;border-bottom:1px solid #1a1a1a;margin-bottom:18px}.tab-row button{flex:1;background:none;border:0;border-bottom:2px solid transparent;color:#555;font-size:12px;font-weight:800;padding:10px 4px}.tab-row button.active{color:var(--accent);border-bottom-color:var(--accent)}
.input-soft{width:100%;background:#1a1a1a;border:0;border-radius:10px;color:#fff;padding:11px 12px;outline:0;font-size:14px}.chip-row{display:flex;gap:6px;flex-wrap:wrap}.chip{padding:7px 11px;background:#1a1a1a;border-radius:9px;color:#aaa;font-size:12px;font-weight:700}.chip.active{background:rgba(255,51,51,.18);color:#fff}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.photo{position:relative;aspect-ratio:3/4;border-radius:12px;overflow:hidden;background:#1a1a1a}.photo img{width:100%;height:100%;object-fit:cover}.photo button{position:absolute;top:6px;right:6px;width:23px;height:23px;border:0;border-radius:50%;background:rgba(0,0,0,.6);color:#fff}
.timer{position:fixed;left:50%;bottom:calc(var(--nav-h) + 22px);transform:translateX(-50%);display:none;align-items:center;gap:16px;background:#1a1a1a;border-radius:16px;padding:12px 22px;z-index:200;box-shadow:0 0 30px rgba(255,51,51,.25)}.timer.show{display:flex}.timer-count{font-family:"Bebas Neue";font-size:40px;color:var(--accent);line-height:1}.timer button{background:none;border:1px solid #333;border-radius:8px;color:#aaa;padding:7px 12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9998;display:none;backdrop-filter:blur(4px)}.side-panel{position:fixed;inset:0;background:#0d0d0d;z-index:9999;transform:translateX(100%);transition:.32s;overflow-y:auto;padding-bottom:28px}.side-panel.open{transform:translateX(0)}.panel-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #151515}
.congrats{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;z-index:300}.congrats.show{display:flex}.congrats-box{background:#1a1a1a;border-radius:20px;padding:30px 24px;text-align:center;width:90%;max-width:300px}
@media(max-width:370px){.bottom-nav{width:calc(100% - 12px)}.nav-btn span{font-size:8px}.nav-icon-wrap{width:38px}.daily-grid{grid-template-columns:86px 1fr}.ring{width:175px;height:175px}.macro-cell{padding-left:8px;padding-right:8px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">EVRY<span>O</span>NE <span>TRACKER</span></div>
  <button class="user-avatar" id="user-avatar" onclick="openProfile()">?</button>
</div>

<div class="pages">
  <section class="page active" id="page-dash">
    <div class="hero">
      <div class="hero-inner">
        <div style="font-size:15px;color:#aaa">Bonjour <span id="hero-name" style="color:#fff;font-weight:700"></span></div>
        <h1>Deviens ta <em>meilleure version.</em></h1>
        <div class="ring">
          <svg viewBox="0 0 190 190" width="190" height="190">
            <defs><linearGradient id="arcGrad" x1="0" x2="1"><stop offset="0%" stop-color="#cc0000"/><stop offset="100%" stop-color="#ff5555"/></linearGradient></defs>
            <circle cx="95" cy="95" r="82" fill="none" stroke="#1a1a1a" stroke-width="5"/>
            <circle id="hero-obj-arc-glow" cx="95" cy="95" r="82" fill="none" stroke="#ff0000" stroke-width="5" stroke-dasharray="515.2" stroke-dashoffset="515.2" style="filter:blur(6px);opacity:.45;transition:.8s"/>
            <circle id="hero-obj-arc" cx="95" cy="95" r="82" fill="none" stroke="url(#arcGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="515.2" stroke-dashoffset="515.2" style="filter:drop-shadow(0 0 8px rgba(255,51,51,.8));transition:.8s"/>
          </svg>
          <div class="ring-center">
            <div class="ring-label" id="hero-obj-type">Objectif</div>
            <div class="ring-value" id="hero-obj-pct">0<span style="font-size:20px">%</span></div>
            <div class="ring-sub">Cible : <span id="hero-obj-cible" style="color:var(--accent)">--</span> kg</div>
          </div>
        </div>
        <div style="text-align:center;margin-top:12px"><button onclick="openProfile();setTimeout(()=>openSubPage('profil'),80)" style="background:none;border:0;color:#888;border-bottom:1px solid #333;padding-bottom:3px">Voir mon objectif <span style="color:var(--accent)">-&gt;</span></button></div>
      </div>
    </div>

    <div class="card stats-3">
      <div class="stat-cell"><div class="eyebrow">Calories</div><div class="stat-val" id="apercu-kcal">0</div><div class="stat-lbl">kcal</div></div>
      <div class="stat-cell"><div class="eyebrow">Seances</div><div class="stat-val" id="stat-semaine">0</div><div class="stat-lbl">ce mois</div></div>
      <div class="stat-cell"><div class="eyebrow">Streak</div><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">jours</div><div style="font-size:10px;color:#555;margin-top:7px">Meilleur : <span id="stat-streak-best" style="color:var(--accent)">0</span></div></div>
    </div>

    <div class="card">
      <div class="eyebrow">Daily score</div>
      <div class="daily-grid">
        <div class="ring" style="width:100px;height:100px">
          <svg viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="42" fill="none" stroke="#222" stroke-width="8"/><circle id="daily-score-arc" cx="50" cy="50" r="42" fill="none" stroke="var(--green)" stroke-width="8" stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="263.9"/></svg>
          <div class="ring-center"><div class="ring-value" id="daily-score-val" style="font-size:30px">0</div><div class="ring-label">/100</div></div>
        </div>
